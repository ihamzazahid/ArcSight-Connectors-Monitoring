# ─── prometheus.yml — add this job to your scrape_configs ────────────────────
scrape_configs:

  - job_name: arcsight_connectors
    scrape_interval: 30s
    scrape_timeout:  10s
    static_configs:
      - targets:
          - localhost:9116          # change to the host running the exporter
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
